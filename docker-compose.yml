version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: crm_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: crm_db
    networks:
      - crm_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: crm_server
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/crm_db
      JWT_SECRET: ${JWT_SECRET:-crm_super_secret_jwt_key_change_in_production}
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - crm_network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: crm_client
    ports:
      - '5173:80'
    depends_on:
      - server
    networks:
      - crm_network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  crm_network:
    driver: bridge
